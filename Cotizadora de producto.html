<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotizador Personal</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 8px;
      color: #222;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    input:focus {
      outline: none;
      border-color: #222;
    }

    .result-box {
      background: #f7f7f7;
      border-radius: 14px;
      padding: 16px;
      margin-top: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #333;
      font-size: 15px;
    }

    .total {
      border-top: 1px solid #ddd;
      padding-top: 14px;
      margin-top: 12px;
      font-size: 22px;
      font-weight: bold;
      color: #111;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: #222;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #000;
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }
  </style>
  
</head>
<body>
  <div class="container">
    <h1>Cotizador Personal</h1>
    <p class="subtitle">Calcula rápido el precio final para tus pedidos</p>

    <label for="precio">Precio del producto ($)</label>
    <input type="number" id="precio" value="0" min="0" step="0.01" oninput="calcular()" />

    <label for="label">Costo de impresión del label ($)</label>
    <input type="number" id="label" value="0.25" min="0" step="0.01" oninput="calcular()" />

    <label for="pasaje">Pasaje para ir a dejarlo ($)</label>
    <input type="number" id="pasaje" value="0.70" min="0" step="0.01" oninput="calcular()" />

    <label for="comision">Comisión delivery (%)</label>
    <input type="number" id="comision" value="3" min="0" step="0.01" oninput="calcular()" />

    <label for="ganancia">Ganancia deseada ($)</label>
    <input type="number" id="ganancia" value="0" min="0" step="0.01" oninput="calcular()" />

    <div class="result-box">
      <div class="row">
        <span>Subtotal</span>
        <span id="subtotal">$0.00</span>
      </div>
      <div class="row">
        <span>Comisión delivery</span>
        <span id="delivery">$0.00</span>
      </div>
      <div class="row">
        <span>Ganancia</span>
        <span id="gananciaMostrar">$0.00</span>
      </div>
      <div class="row total">
        <span>Total cotizado</span>
        <span id="total">$0.00</span>
      </div>
    </div>

    <button onclick="copiarCotizacion()">Copiar cotización</button>

    <p class="note">MonterrozaSalomon 2026 - personal practice - cotizacion de pedidos de Online Product</p>
  </div>

  <script>
    function obtenerValor(id) {
      return parseFloat(document.getElementById(id).value) || 0;
    }

    function dinero(valor) {
      return "$" + valor.toFixed(2);
    }

    function calcular() {
      const precio = obtenerValor("precio");
      const label = obtenerValor("label");
      const pasaje = obtenerValor("pasaje");
      const porcentajeComision = obtenerValor("comision");
      const ganancia = obtenerValor("ganancia");

      const subtotal = precio + label + pasaje;
      const delivery = subtotal * (porcentajeComision / 100);
      const total = subtotal + delivery + ganancia;

      document.getElementById("subtotal").textContent = dinero(subtotal);
      document.getElementById("delivery").textContent = dinero(delivery);
      document.getElementById("gananciaMostrar").textContent = dinero(ganancia);
      document.getElementById("total").textContent = dinero(total);
    }

    function copiarCotizacion() {
      const total = document.getElementById("total").textContent;
      const texto = `Total cotizado: ${total}`;

      navigator.clipboard.writeText(texto).then(() => {
        alert("Cotización copiada: " + total);
      });
    }

    calcular();
  </script>
</body>
</html>
